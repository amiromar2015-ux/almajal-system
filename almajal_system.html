<script>
// Password protection — SHA-256 hash
const PASS_HASH = '76d11530d929d83aab83903f57df592f2b754aee63815183e62ecb6c93c596f5';
const SESSION_KEY = 'almajal_auth';

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const input = document.getElementById('pass-input').value;
  if (!input) return shake();
  const hash = await sha256(input);
  if (hash === PASS_HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    shake();
    document.getElementById('pass-error').style.opacity = '1';
    document.getElementById('pass-input').value = '';
    setTimeout(() => document.getElementById('pass-error').style.opacity = '0', 2500);
  }
}

function shake() {
  const box = document.getElementById('login-box');
  box.style.animation = 'none';
  box.offsetHeight;
  box.style.animation = 'shake .4s ease';
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });
});
</script>

function lineSpentAll(){
  const map={};
  // Transactions (includes invoices from invoices tab)
  DB.transactions.filter(t=>t.type==='out').forEach(t=>{ if(t.budgetLineId) map[t.budgetLineId]=(map[t.budgetLineId]||0)+t.amount; });
  // Claims
  DB.claims.forEach(c=>{ if(c.budgetLineId) map[c.budgetLineId]=(map[c.budgetLineId]||0)+c.amount; });
  return map;
}

function projTotals(){
  const ls=lineSpentAll();
  return DB.projects.map(p=>{
    const pl=projLines(p.id);
    const approved=pl.reduce((s,l)=>s+l.approvedAmount,0);
    const spent=pl.reduce((s,l)=>s+(ls[l.id]||0),0);
    const pending=DB.claims.filter(c=>c.projectId===p.id&&c.status==='pending').reduce((s,c)=>s+c.amount,0);
    return {...p,approved,spent,pending,remaining:approved-spent,burnPct:pct(spent,approved)};
  });
}

// Get all budget alerts
function getBudgetAlerts(){
  const ls=lineSpentAll();
  const alerts=[];
  DB.projects.forEach(p=>{
    projLines(p.id).forEach(l=>{
      const sp=ls[l.id]||0;
      const p2=pct(sp,l.approvedAmount);
      if(p2>=DANGER_PCT&&p2<1000) alerts.push({type:'danger',proj:p.name,projColor:p.color,line:l.category,pct:p2,spent:sp,approved:l.approvedAmount});
      else if(p2>=WARN_PCT) alerts.push({type:'warn',proj:p.name,projColor:p.color,line:l.category,pct:p2,spent:sp,approved:l.approvedAmount});
    });
  });
  return alerts.sort((a,b)=>b.pct-a.pct);
}

function monthlyData(year,month,projectId){
  const prefix=`${year}-${String(month).padStart(2,'0')}`;
  const isAll=projectId==='all';
  const filterP=t=>isAll||t.projectId===projectId;
  const txs=DB.transactions.filter(t=>t.date&&t.date.startsWith(prefix)&&filterP(t));
  const custs=DB.custodies.filter(c=>c.issuedAt&&c.issuedAt.startsWith(prefix)&&filterP(c));
  const clms=DB.claims.filter(c=>c.date&&c.date.startsWith(prefix)&&filterP(c));
  const ls=lineSpentAll();
  const projs=isAll?DB.projects:DB.projects.filter(p=>p.id===projectId);
  const byLine={};
  projs.forEach(p=>{
    projLines(p.id).forEach(l=>{
      if(!byLine[l.category]) byLine[l.category]={category:l.category,approved:0,spent:0};
      byLine[l.category].approved+=l.approvedAmount;
      const lt=txs.filter(t=>t.budgetLineId===l.id&&t.type==='out').reduce((s,t)=>s+t.amount,0);
      const li=custs.filter(c=>c.budgetLineId===l.id).reduce((s,c)=>(c.invoices||[]).reduce((a,i)=>a+i.amount,0)+s,0);
      const lc=clms.filter(c=>c.budgetLineId===l.id).reduce((s,c)=>s+c.amount,0);
      byLine[l.category].spent+=lt+li+lc;
    });
  });
  const totalSpent=Object.values(byLine).reduce((s,b)=>s+b.spent,0);
  const totalApproved=Object.values(byLine).reduce((s,b)=>s+b.approved,0);
  const openCusts=DB.custodies.filter(c=>c.status!=='settled'&&filterP(c));
  const pendClaims=DB.claims.filter(c=>c.status==='pending'&&filterP(c));
  const endDate=`${year}-${String(month).padStart(2,'0')}-31`;
  const cumSpent=DB.transactions.filter(t=>t.type==='out'&&t.date<=endDate&&filterP(t)).reduce((s,t)=>s+t.amount,0)
    +DB.custodies.filter(c=>c.issuedAt<=endDate&&filterP(c)).reduce((s,c)=>(c.invoices||[]).reduce((a,i)=>a+i.amount,0)+s,0)
    +DB.claims.filter(c=>c.date<=endDate&&filterP(c)).reduce((s,c)=>s+c.amount,0);
  return {byLine:Object.values(byLine),totalSpent,totalApproved,openCusts,pendClaims,cumSpent,txs,custs,clms};
}

function searchHTML(){
  const q = globalSearch.trim().toLowerCase();
  if(!q) return `<div style="text-align:center;padding:60px 20px;color:var(--text4);font-size:14px;">اكتب في خانة البحث فوق 🔍</div>`;

  const results = [];

  // Search transactions
  DB.transactions.forEach(t=>{
    if(!t.description?.toLowerCase().includes(q)&&!t.date?.includes(q)) return;
    results.push({type:'tx',icon:'💰',title:t.description||t.category,sub:`${projById(t.projectId).name} · ${t.date}`,amount:t.amount,amountCol:t.type==='in'?'#10b981':'#f43f5e',sign:t.type==='in'?'+':'-',action:`switchTab('txs')`});
  });

  // Search custodies
  DB.custodies.forEach(c=>{
    const emp=empById(c.employeeId);
    if(!emp.name?.toLowerCase().includes(q)&&!c.purpose?.toLowerCase().includes(q)&&!c.fileNum?.toLowerCase().includes(q)) return;
    results.push({type:'cust',icon:'👤',title:`عهدة — ${emp.name}`,sub:`${projById(c.projectId).name} · ${c.issuedAt||''} · ${c.fileNum||''}`,amount:c.amount,amountCol:'#f59e0b',sign:'',action:`switchTab('custs')`});
  });

  // Search claims
  DB.claims.forEach(c=>{
    if(!c.supplier?.toLowerCase().includes(q)&&!c.invoiceNo?.toLowerCase().includes(q)) return;
    results.push({type:'claim',icon:'🏪',title:c.supplier,sub:`${projById(c.projectId).name} · ${c.date} · ${c.invoiceNo||''}`,amount:c.amount,amountCol:'#38bdf8',sign:'',action:`switchTab('suppliers')`});
  });

  // Search employees
  DB.employees.forEach(e=>{
    if(!e.name?.toLowerCase().includes(q)&&!e.role?.toLowerCase().includes(q)) return;
    const empCusts=DB.custodies.filter(c=>c.employeeId===e.id);
    const total=empCusts.reduce((s,c)=>s+c.amount,0);
    results.push({type:'emp',icon:'👷',title:e.name,sub:`${e.role} · ${empCusts.length} عهدة`,amount:total,amountCol:'#a5b4fc',sign:'',action:`switchTab('custs')`});
  });

  // Search assets
  (DB.assets||[]).forEach(a=>{
    if(!a.name?.toLowerCase().includes(q)&&!a.serialNo?.toLowerCase().includes(q)) return;
    const t=ASSET_TYPES.find(x=>x.k===a.type)||{ic:'📦'};
    results.push({type:'asset',icon:t.ic,title:a.name,sub:`${projById(a.projectId).name} · ${a.serialNo||''} · ${a.condition}`,amount:a.value||0,amountCol:'#a78bfa',sign:'',action:`switchTab('assets')`});
  });

  // Search statements
  (DB.statements||[]).forEach(s=>{
    const emp=empById(s.employeeId);
    if(!emp.name?.toLowerCase().includes(q)&&!s.fileNum?.toLowerCase().includes(q)) return;
    const total=s.items.reduce((a,i)=>a+i.amount,0);
    results.push({type:'stmt',icon:'📝',title:`كشف — ${emp.name}`,sub:`${projById(s.projectId).name} · ${s.date} · ${s.fileNum||''}`,amount:total,amountCol:'#10b981',sign:'',action:`switchTab('statements')`});
  });

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <div style="font-weight:700;font-size:14px;">نتائج البحث عن: <span style="color:var(--gold2);">"${globalSearch}"</span></div>
    <span style="font-size:12px;color:var(--text4);">${results.length} نتيجة</span>
  </div>
  ${results.length===0?`
  <div style="background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.07);border-radius:14px;padding:48px;text-align:center;color:var(--text4);font-size:13px;">
    لا توجد نتائج — جرب كلمة أخرى
  </div>`:`
  <div class="glass" style="overflow:hidden;">
    ${results.map((r,i)=>`
    <div onclick="${r.action}" class="hrow" style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:${i<results.length-1?'1px solid rgba(255,255,255,0.04)':'none'};cursor:pointer;transition:background .12s;">
      <div style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">${r.icon}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:13px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.title}</div>
        <div style="font-size:10px;color:var(--text4);margin-top:2px;">${r.sub}</div>
      </div>
      ${r.amount>0?('<div style="font-weight:800;font-size:14px;color:'+r.amountCol+';flex-shrink:0;">'+r.sign+fmt(r.amount)+' <span style="font-size:9px;font-weight:400;">'+SAR+'</span></div>'):''}
      <span style="color:var(--text4);font-size:14px;">←</span>
    </div>`).join('')}
  </div>`}`;
}

/* ── DAILY / WEEKLY ── */
function dailyHTML(){
  const todayStr = today();
  const weekAgo  = new Date(); weekAgo.setDate(weekAgo.getDate()-6);
  const weekStr  = weekAgo.toISOString().slice(0,10);

  // Today's transactions
  const todayTxs    = DB.transactions.filter(t=>t.date===todayStr);
  const todayCusts  = DB.custodies.filter(c=>c.issuedAt===todayStr);
  const todayClaims = DB.claims.filter(c=>c.date===todayStr);
  const todayOut    = todayTxs.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
  const todayIn     = todayTxs.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
  const todayCustAmt= todayCusts.reduce((s,c)=>s+c.amount,0);
  const todayClaimAmt=todayClaims.reduce((s,c)=>s+c.amount,0);

  // Week transactions
  const weekTxs    = DB.transactions.filter(t=>t.date>=weekStr&&t.date<=todayStr);
  const weekOut    = weekTxs.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
  const weekIn     = weekTxs.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
  const weekCusts  = DB.custodies.filter(c=>c.issuedAt>=weekStr&&c.issuedAt<=todayStr).reduce((s,c)=>s+c.amount,0);

  // Daily spending per project (last 7 days)
  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    return d.toISOString().slice(0,10);
  });

  return `
  <div style="font-weight:800;font-size:16px;margin-bottom:18px;">📅 التقرير اليومي والأسبوعي</div>

  <!-- Today KPIs -->
  <div style="font-weight:700;font-size:13px;color:var(--gold2);margin-bottom:12px;">
    اليوم — ${new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
  </div>
  <div class="grid4" style="margin-bottom:20px;">
    ${[
      {lb:'صادر اليوم',    v:todayOut,      c:'#f87171'},
      {lb:'وارد اليوم',    v:todayIn,       c:'#10b981'},
      {lb:'عهد صُرفت',     v:todayCustAmt,  c:'#f59e0b'},
      {lb:'مطالبات موردين',v:todayClaimAmt, c:'#38bdf8'},
    ].map(k=>`
    <div class="glass" style="padding:14px 16px;">
      <div style="font-size:9px;color:var(--text4);letter-spacing:.8px;margin-bottom:6px;">${k.lb}</div>
      <div style="font-weight:900;font-size:17px;color:${k.c};">${fmt(k.v)} <span style="font-size:9px;font-weight:400;">${SAR}</span></div>
    </div>`).join('')}
  </div>

  <!-- Today detail -->
  ${todayTxs.length===0&&todayCusts.length===0&&todayClaims.length===0?`
  <div style="...glass padding:20px;text-align:center;color:var(--text4);font-size:13px;margin-bottom:20px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.07);border-radius:14px;padding:24px;">
    لا توجد حركات اليوم
  </div>`:`
  <div class="glass" style="overflow:hidden;margin-bottom:20px;">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;color:var(--text2);">حركات اليوم</div>
    ${[
      ...todayTxs.map(t=>({icon:CAT_IC[t.category]||'💰',title:t.description||t.category,sub:projById(t.projectId).name,amount:t.amount,col:t.type==='in'?'#10b981':'#f43f5e',sign:t.type==='in'?'+':'-'})),
      ...todayCusts.map(c=>({icon:'👤',title:`عهدة — ${empById(c.employeeId).name}`,sub:projById(c.projectId).name,amount:c.amount,col:'#f59e0b',sign:''})),
      ...todayClaims.map(c=>({icon:'🏪',title:c.supplier,sub:projById(c.projectId).name,amount:c.amount,col:'#38bdf8',sign:''})),
    ].map((r,i,arr)=>`
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:${i<arr.length-1?'1px solid rgba(255,255,255,0.04)':'none'};">
      <div style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">${r.icon}</div>
      <div style="flex:1;"><div style="font-size:13px;color:#e2e8f0;font-weight:500;">${r.title}</div><div style="font-size:10px;color:var(--text4);">${r.sub}</div></div>
      <div style="font-weight:800;font-size:14px;color:${r.col};">${r.sign}${fmt(r.amount)} <span style="font-size:9px;font-weight:400;">${SAR}</span></div>
    </div>`).join('')}
  </div>`}

  <!-- Week KPIs -->
  <div style="font-weight:700;font-size:13px;color:var(--gold2);margin-bottom:12px;">آخر 7 أيام</div>
  <div class="grid3" style="margin-bottom:20px;">
    ${[
      {lb:'إجمالي الصادر',v:weekOut,  c:'#f87171'},
      {lb:'إجمالي الوارد', v:weekIn,   c:'#10b981'},
      {lb:'عهد مصروفة',   v:weekCusts,c:'#f59e0b'},
    ].map(k=>`
    <div class="glass" style="padding:14px 16px;">
      <div style="font-size:9px;color:var(--text4);letter-spacing:.8px;margin-bottom:6px;">${k.lb}</div>
      <div style="font-weight:900;font-size:18px;color:${k.c};">${fmt(k.v)} <span style="font-size:9px;font-weight:400;">${SAR}</span></div>
    </div>`).join('')}
  </div>

  <!-- 7-day chart per project -->
  <div class="glass" style="padding:18px;">
    <div style="font-weight:700;font-size:13px;color:var(--text2);margin-bottom:16px;">مصروف كل مشروع — آخر 7 أيام</div>
    ${DB.projects.map(p=>{
      const pDays=days.map(d=>DB.transactions.filter(t=>t.type==='out'&&t.date===d&&t.projectId===p.id).reduce((s,t)=>s+t.amount,0));
      const total=pDays.reduce((s,v)=>s+v,0);
      const max=Math.max(...pDays)||1;
      return `
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:8px;height:8px;border-radius:50%;background:${p.color};"></div>
            <span style="font-size:13px;font-weight:600;">${p.name}</span>
          </div>
          <span style="font-size:12px;font-weight:700;color:${p.color};">${fmt(total)} ${SAR}</span>
        </div>
        <div style="display:flex;gap:3px;align-items:flex-end;height:40px;">
          ${pDays.map((v,i)=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
            <div style="width:100%;height:${Math.max(3,(v/max)*36)}px;background:${v>0?p.color:'rgba(255,255,255,0.05)'};border-radius:3px 3px 0 0;transition:height .4s;"></div>
            <div style="font-size:8px;color:var(--text4);">${days[i].slice(8)}</div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── DASHBOARD ── */
function dashHTML(){
  const pt=projTotals();
  const openCusts=DB.custodies.filter(c=>c.status!=='settled').length;
  const pendClaims=DB.claims.filter(c=>c.status==='pending');
  const pendExtracts=(DB.extracts||[]).filter(e=>e.status==='pending');
  const pendVal=pendClaims.reduce((s,c)=>s+c.amount,0);
  const pendExtVal=pendExtracts.reduce((s,e)=>s+e.amount,0);
  const alerts=getBudgetAlerts();
  const critAlerts=alerts.filter(a=>a.type==='danger');

  // Calculate employee deficits (custody amount not yet covered by invoices/returns)
  const DEFICIT_THRESHOLD=5000;
  const deficits=[];
  DB.employees.forEach(e=>{
    const custs=DB.custodies.filter(c=>c.employeeId===e.id);
    const totalOpen=custs.reduce((s,c)=>{
      const invTotal=(c.invoices||[]).reduce((a,i)=>a+(i.amount||0),0);
      const diff=c.amount-invTotal-(c.returned||0);
      return s+(diff>0?diff:0);
    },0);
    if(totalOpen>=DEFICIT_THRESHOLD) deficits.push({emp:e,amount:totalOpen});
  });

  let alertBars='';
  if(critAlerts.length>0) alertBars+=`<div class="alert-bar" style="background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.25);" onclick="switchTab('alerts')"><span class="notif-dot" style="background:#f43f5e;flex-shrink:0;"></span><span style="font-size:12px;color:#f87171;font-weight:700;">${critAlerts.length} بنود تجاوزت ${DANGER_PCT}% من ميزانيتها — اضغط للتفاصيل</span><span style="margin-right:auto;color:rgba(248,113,113,0.5);font-size:14px;">←</span></div>`;
  if(deficits.length>0) alertBars+=`<div class="alert-bar" style="background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.25);" onclick="switchTab('empReport')"><span>🔴</span><span style="font-size:12px;color:#f87171;font-weight:700;">${deficits.length} موظف عليه عجز فوق ${fmt(DEFICIT_THRESHOLD)} ${SAR} — ${deficits.map(d=>d.emp.name).join('، ')}</span><span style="margin-right:auto;color:rgba(248,113,113,0.5);font-size:14px;">←</span></div>`;
  if(openCusts>0) alertBars+=`<div class="alert-bar" style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.22);" onclick="switchTab('custs')"><span>⚠️</span><span style="font-size:12px;color:#fcd34d;font-weight:600;">${openCusts} عهد مفتوحة بدون تسوية</span><span style="margin-right:auto;color:rgba(252,211,77,0.4);font-size:14px;">←</span></div>`;
  if(pendClaims.length>0) alertBars+=`<div class="alert-bar" style="background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.2);" onclick="switchTab('suppliers')"><span>🏪</span><span style="font-size:12px;color:#38bdf8;font-weight:600;">${pendClaims.length} مطالبات موردين معلقة — ${fmt(pendVal)} ${SAR}</span><span style="margin-right:auto;color:rgba(56,189,248,0.4);font-size:14px;">←</span></div>`;
  if(pendExtracts.length>0) alertBars+=`<div class="alert-bar" style="background:rgba(212,168,67,0.07);border:1px solid rgba(212,168,67,0.22);" onclick="switchTab('extracts')"><span>📑</span><span style="font-size:12px;color:var(--gold2);font-weight:600;">${pendExtracts.length} مستخلصات معلقة — ${fmt(pendExtVal)} ${SAR}</span><span style="margin-right:auto;color:rgba(212,168,67,0.4);font-size:14px;">←</span></div>`;

  const cards=pt.map(p=>{
    const col=burnColor(p.burnPct);
    const bg=burnBg(p.burnPct);
    const bd=burnBorder(p.burnPct);
    const projAlerts=getBudgetAlerts().filter(a=>a.proj===p.name);
    return `
    <div class="card" style="border-color:${p.color}22;cursor:pointer;" onclick="openDetail('${p.id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">

        </div>

          <div class="pbar-fill" style="width:${Math.min(100,p.burnPct)}%;background:${p.burnPct>=DANGER_PCT?'linear-gradient(90deg,#dc2626,#ef4444)':p.burnPct>=WARN_PCT?`linear-gradient(90deg,#d97706,#f59e0b)`:`linear-gradient(90deg,${p.color}88,${p.color})`};"></div>

        <div class="mstat"><span class="mstat-label">${s.lb}</span><div class="mstat-val" style="color:${s.c};">${s.v<0?'-':''}${fmt(s.v)}</div></div>`).join('')}

  }).join('');

  const totals=pt.reduce((a,p)=>({approved:a.approved+p.approved,spent:a.spent+p.spent,pending:a.pending+p.pending,remaining:a.remaining+p.remaining}),{approved:0,spent:0,pending:0,remaining:0});

  return `

    <div class="glass" style="padding:14px 16px;">
      <div style="font-size:9px;color:var(--text4);letter-spacing:.8px;margin-bottom:6px;">${k.lb}</div>
      <div style="font-weight:900;font-size:18px;color:${k.c};">${fmt(k.v)} <span style="font-size:10px;font-weight:400;color:var(--text4);">${SAR}</span></div>
    </div>`).join('')}
  </div>`;
}

/* ── ALERTS TAB ── */
function alertsHTML(){
  const alerts=getBudgetAlerts();
  if(alerts.length===0) return `
    <div style="text-align:center;padding:60px 20px;">

    </div>`;

  const danger=alerts.filter(a=>a.type==='danger');
  const warn=alerts.filter(a=>a.type==='warn');

  const renderGroup=(list,title,col,icon)=>list.length===0?'':` 
    <div style="font-weight:700;font-size:13px;color:${col};margin-bottom:12px;display:flex;align-items:center;gap:8px;">${icon} ${title} (${list.length})</div>

    <div class="card" style="margin-bottom:10px;border-color:${col}25;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">

            <span style="font-size:11px;color:var(--text3);">${a.proj}</span>
          </div>
          <div style="font-weight:700;font-size:14px;">${CAT_IC[a.line]||'📦'} ${a.line}</div>
        </div>
        <span class="badge" style="background:${col}18;color:${col};border:1px solid ${col}33;font-size:12px;">${a.pct}%</span>
      </div>
      <div class="pbar" style="margin-bottom:8px;">
        <div class="pbar-fill" style="width:${Math.min(100,a.pct)}%;background:${col};"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);">
        <span>مصروف: <strong style="color:${col};">${fmt(a.spent)} ${SAR}</strong></span>
        <span>معتمد: <strong style="color:var(--text2);">${fmt(a.approved)} ${SAR}</strong></span>
        <span>متبقي: <strong style="color:${a.approved-a.spent<0?'#f43f5e':'#10b981'};">${fmt(a.approved-a.spent)} ${SAR}</strong></span>
      </div>
    </div>`).join('')}`;

  return `
  <div style="font-weight:800;font-size:16px;margin-bottom:20px;">🔔 تنبيهات الميزانية</div>

  </div>
  ${renderGroup(danger,'بنود تجاوزت '+DANGER_PCT+'%','#f43f5e','🚨')}
  ${danger.length>0&&warn.length>0?'<div style="margin:16px 0;border-top:1px solid rgba(255,255,255,0.06);"></div>':''}
  ${renderGroup(warn,'بنود تجاوزت '+WARN_PCT+'%','#f59e0b','⚠️')}`;
}

        </tr>`;

      <tfoot><tr style="background:rgba(255,255,255,0.025);">

function renderClaimsTable(){
  const text=(document.getElementById('cl-filter-text')?.value||'').toLowerCase();
  const month=document.getElementById('cl-filter-month')?.value||'';
  const status=document.getElementById('cl-filter-status')?.value||'';
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  let claims=[...DB.claims].reverse();
  if(text) claims=claims.filter(c=>(c.supplier||'').toLowerCase().includes(text)||(c.invoiceNo||'').toLowerCase().includes(text));
  if(month) claims=claims.filter(c=>(c.date||'').substring(5,7)===month);
  if(status) claims=claims.filter(c=>c.status===status);

  const tbody=document.getElementById('cl-tbody');
  if(!tbody) return;
  if(!claims.length){
    tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--text4);">لا توجد نتائج</td></tr>';
    return;
  }
  tbody.innerHTML=claims.map(c=>{
    const mn=c.date?c.date.substring(5,7):'';
    const monthName=mn?months[+mn-1]:'—';
    const proj=DB.projects.find(p=>p.id===c.projectId)||{name:'—'};
    const line=DB.lines.find(l=>l.id===c.budgetLineId)||{category:'—'};
    return '<tr>'+
      '<td style="font-weight:700;color:var(--indigo);font-size:11px;">'+monthName+'</td>'+
      '<td style="color:var(--text3);font-size:11px;">'+(c.date||'—')+'</td>'+
      '<td><div style="font-weight:600;">'+c.supplier+'</div>'+(c.invoiceNo?'<div style="font-size:10px;color:var(--text4);">'+c.invoiceNo+'</div>':'')+'</td>'+
      '<td style="font-size:12px;">'+proj.name+'</td>'+
      '<td style="font-size:11px;color:var(--text3);">'+line.category+'</td>'+
      '<td style="font-weight:800;color:#38bdf8;">'+fmt(c.amount)+' <span style="font-size:9px;">'+SAR+'</span></td>'+
      '<td><span class="badge badge-'+(c.status==='paid'?'green':'blue')+'">'+(c.status==='paid'?'مدفوع':'معلق')+'</span></td>'+
      '<td>'+(c.status==='pending'?`<button onclick="payClaim('${c.id}')" style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:8px;padding:5px 10px;color:#34d399;font-family:var(--font);font-weight:600;font-size:11px;cursor:pointer;">دفع ✓</button>`:'<span style="font-size:10px;color:var(--text4);">'+(c.paidDate||'')+'</span>')+'</td>'+
      '<td style="font-size:11px;color:var(--text3);max-width:150px;">'+(c.notes||'—')+'</td>'+
      '<td style="white-space:nowrap;display:flex;gap:4px;align-items:center;">'+
        (c.invoiceUrl?'<a href="'+c.invoiceUrl+'" target="_blank" style="font-size:11px;color:#38bdf8;text-decoration:none;">🔗</a> ':'')+
        `<button onclick="openModal('editClaim','${c.id}')" style="background:none;border:none;cursor:pointer;color:var(--gold2);font-size:13px;">✏️</button>`+
        `<button onclick="deleteClaim('${c.id}')" style="background:none;border:none;cursor:pointer;color:#f43f5e;font-size:13px;">🗑</button>`+
      '</td>'+
    '</tr>';
  }).join('');
}

function suppHTML(){

  ${monthKeys.length>0?`

        '<div style="font-size:10px;color:var(--text4);margin-top:2px;">'+m.count+' مطالبة</div>'+
        '<div style="font-size:13px;font-weight:800;color:#38bdf8;margin-top:4px;">'+fmt(m.total)+' '+SAR+'</div>'+

function renderExtractsTable(){
  const projF=document.getElementById('ext-filter-proj')?.value||'';
  const deductF=document.getElementById('ext-filter-deduct')?.value||'';
  const locF=document.getElementById('ext-filter-loc')?.value||'';
  let exts=[...(DB.extracts||[])].reverse();
  if(projF) exts=exts.filter(e=>e.projectId===projF);
  if(deductF) exts=exts.filter(e=>e.deductStatus===deductF);
  if(locF) exts=exts.filter(e=>e.location===locF);

  const tbody=document.getElementById('ext-tbody');
  if(!tbody) return;
  if(!exts.length){
    tbody.innerHTML='<tr><td colspan="12" style="text-align:center;padding:20px;color:var(--text4);">لا توجد نتائج</td></tr>';
    return;
  }
  tbody.innerHTML=exts.map(e=>{
    const proj=DB.projects.find(p=>p.id===e.projectId)||{name:'—'};
    const line=DB.lines.find(l=>l.id===e.lineId)||{category:'—'};
    const realIdx=(DB.extracts||[]).indexOf(DB.extracts.find(x=>x.id===e.id));
    const deductColor=e.deductStatus==='تم التخفيض'?'#10b981':'#f59e0b';
    const locColor=e.location==='لدى الإدارة المالية'?'#6366f1':'#38bdf8';
    return '<tr>'+
      '<td style="font-weight:700;">'+(e.refNum||'—')+'</td>'+
      '<td style="color:var(--text3);font-size:11px;">'+proj.name+'</td>'+
      '<td style="color:var(--text3);font-size:11px;">'+line.category+'</td>'+
      '<td style="font-weight:800;color:var(--gold2);">'+fmt(e.amount||0)+' '+SAR+'</td>'+
      '<td style="color:var(--text3);">'+(e.date||'—')+'</td>'+
      '<td style="color:var(--text3);">'+(e.sendDate||'—')+'</td>'+
      '<td style="color:var(--text3);">'+(e.sendRef||'—')+'</td>'+
      '<td style="color:var(--text3);">'+(e.custodyMonth||'—')+'</td>'+
      '<td style="color:var(--text3);">'+(e.custodyType||'—')+'</td>'+
      '<td><span style="background:'+deductColor+'18;color:'+deductColor+';border-radius:50px;padding:3px 8px;font-size:11px;font-weight:700;">'+(e.deductStatus||'جاري التخفيض')+'</span></td>'+
      '<td><span style="background:'+locColor+'18;color:'+locColor+';border-radius:50px;padding:3px 8px;font-size:11px;">'+(e.location||'—')+'</span></td>'+
      '<td style="white-space:nowrap;">'+
        `<button onclick="printExtract('${e.id}')" style="background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.25);border-radius:6px;padding:4px 8px;color:var(--gold2);font-size:11px;cursor:pointer;">🖨</button> `+
        `<button onclick="deleteExtract('${e.id}')" style="background:none;border:none;cursor:pointer;color:#f43f5e;font-size:13px;">🗑</button>`+
      '</td>'+
    '</tr>';
  }).join('');
}

function exportExtractsExcel(){
  const exts=DB.extracts||[];
  if(!exts.length) return showToast('لا توجد كشوف','#f43f5e');
  const rows=[['رقم الكشف','المشروع','البند','قيمة الكشف','تاريخ الكشف','تاريخ الإرسال','رقم الإرسالية','عهدة الشهر','نوع العهدة','حالة التخفيض','موقف الكشف']];
  exts.forEach(e=>{
    const proj=DB.projects.find(p=>p.id===e.projectId)||{name:'—'};
    const line=DB.lines.find(l=>l.id===e.lineId)||{category:'—'};
    rows.push([e.refNum||'',proj.name,line.category,e.amount||0,e.date||'',e.sendDate||'',e.sendRef||'',e.custodyMonth||'',e.custodyType||'',e.deductStatus||'',e.location||'']);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='الكشوف_'+today()+'.csv';
  a.click();
  showToast('✅ تم التصدير','#10b981');
}

}

function renderStatementsTable(){
  const projF=document.getElementById('st-filter-proj')?.value||'';
  const deductF=document.getElementById('st-filter-deduct')?.value||'';
  const locF=document.getElementById('st-filter-loc')?.value||'';
  let exts=[...(DB.extracts||[])].reverse();
  if(projF) exts=exts.filter(e=>e.projectId===projF);
  if(deductF) exts=exts.filter(e=>e.deductStatus===deductF);
  if(locF) exts=exts.filter(e=>e.location===locF);

  const tbody=document.getElementById('st-tbody');
  if(!tbody) return;
  if(!exts.length){
    tbody.innerHTML='<tr><td colspan="12" style="text-align:center;padding:20px;color:var(--text4);">لا توجد نتائج</td></tr>';
    return;
  }
  tbody.innerHTML=exts.map(e=>{
    const proj=DB.projects.find(p=>p.id===e.projectId)||{name:'—'};
    const line=DB.lines.find(l=>l.id===e.lineId)||{category:'—'};
    const deductColor=e.deductStatus==='تم التخفيض'?'#10b981':'#f59e0b';
    const locColor=e.location==='لدى الإدارة المالية'?'#6366f1':'#38bdf8';
    return '<tr>'+
      '<td style="font-weight:700;">'+(e.refNum||'—')+'</td>'+
      '<td style="color:var(--text3);font-size:11px;">'+proj.name+'</td>'+
      '<td style="color:var(--text3);font-size:11px;">'+line.category+'</td>'+
      '<td style="font-weight:800;color:var(--gold2);">'+fmt(e.amount||0)+' '+SAR+'</td>'+
      '<td style="color:var(--text3);">'+(e.date||'—')+'</td>'+
      '<td style="color:var(--text3);">'+(e.sendDate||'—')+'</td>'+
      '<td style="color:var(--text3);">'+(e.sendRef||'—')+'</td>'+
      '<td style="color:var(--text3);">'+(e.custodyMonth||'—')+'</td>'+

      `<td><button onclick="printExtract('${e.id}')" style="background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.25);border-radius:6px;padding:4px 8px;color:var(--gold2);font-size:11px;cursor:pointer;">🖨</button> `+

  }).join('');
}

let tempInvVehicles = [];

function addInvVehicle(){
  const no = document.getElementById('ni-veh-no')?.value?.trim();
  const amt = parseFloat(document.getElementById('ni-veh-amt')?.value)||0;
  if(!no) return showToast('أدخل رقم السيارة','#f43f5e');
  if(!amt) return showToast('أدخل المبلغ','#f43f5e');
  tempInvVehicles.push({no, amount: amt});
  document.getElementById('ni-veh-no').value='';
  document.getElementById('ni-veh-amt').value='';
  refreshInvVehicles();
  // Update total amount
  const total = tempInvVehicles.reduce((s,v)=>s+v.amount,0);
  const amtEl = document.getElementById('ni-amount');
  if(amtEl){ amtEl.value=total; calcInvTax(); }
}

function removeInvVehicle(i){
  tempInvVehicles.splice(i,1);
  refreshInvVehicles();
  const total = tempInvVehicles.reduce((s,v)=>s+v.amount,0);
  const amtEl = document.getElementById('ni-amount');
  if(amtEl){ amtEl.value=total; calcInvTax(); }
}

function refreshInvVehicles(){
  const el = document.getElementById('ni-vehicles-list');
  if(!el) return;
  if(!tempInvVehicles.length){
    el.innerHTML='';
    return;
  }
  el.innerHTML = tempInvVehicles.map((v,i)=>
    '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);">'+
    '<span style="flex:1;font-size:12px;font-weight:600;">'+v.no+'</span>'+
    '<span style="font-size:12px;color:#6366f1;font-weight:700;">'+fmt(v.amount)+' '+SAR+'</span>'+
    '<button onclick="removeInvVehicle('+i+')" style="background:none;border:none;cursor:pointer;color:#f43f5e;font-size:14px;">✕</button>'+
    '</div>'
  ).join('');
}

function updateInvLines(projId){
  if(!projId) projId=document.getElementById('ni-proj')?.value;
  const lineEl=document.getElementById('ni-line');
  if(!lineEl) return;
  const lines=(DB.lines||[]).filter(l=>l.projectId===projId);
  lineEl.innerHTML=lines.length?lines.map(l=>'<option value="'+l.id+'">'+l.category+'</option>').join(''):'<option value="">لا توجد بنود</option>';
}

function calcInvTax(){
  const amt=parseFloat(document.getElementById('ni-amount')?.value)||0;
  const tax=Math.round(amt*0.15*100)/100;
  const taxEl=document.getElementById('ni-tax');
  const totalEl=document.getElementById('ni-total');
  if(taxEl) taxEl.value=tax;
  if(totalEl) totalEl.value=Math.round((amt+tax)*100)/100;
}

function calcInvTotal(){
  const amt=parseFloat(document.getElementById('ni-amount')?.value)||0;
  const tax=parseFloat(document.getElementById('ni-tax')?.value)||0;
  const totalEl=document.getElementById('ni-total');
  if(totalEl) totalEl.value=Math.round((amt+tax)*100)/100;
}

function saveInvoiceRow(){
  const projId=document.getElementById('ni-proj')?.value;
  const lineId=document.getElementById('ni-line')?.value;
  const supplier=document.getElementById('ni-supplier')?.value?.trim()||'';
  const desc=document.getElementById('ni-desc')?.value?.trim()||'';
  const vehicleNo=tempInvVehicles.length?tempInvVehicles.map(v=>v.no).join(', '):'';
  const vehicleDetails=[...tempInvVehicles];
  const invoiceNo=document.getElementById('ni-no')?.value?.trim()||'';
  const date=document.getElementById('ni-date')?.value||today();
  const amount=parseFloat(document.getElementById('ni-amount')?.value)||0;
  const tax=parseFloat(document.getElementById('ni-tax')?.value)||0;
  const total=parseFloat(document.getElementById('ni-total')?.value)||0;
  if(!amount||amount<=0) return showToast('أدخل قيمة الفاتورة','#f43f5e');
  if(!supplier) return showToast('أدخل اسم المورد','#f43f5e');
  if(!DB.invoices) DB.invoices=[];
  if(!DB.contracts) DB.contracts=[];
  if(!DB.purchaseRequests) DB.purchaseRequests=[];
  if(!DB.fixedExpenses) DB.fixedExpenses=[];
  if(!DB.tasks) DB.tasks=[];
  // Check duplicate invoice number
  if(invoiceNo){
    const dup=DB.invoices.find(i=>i.invoiceNo===invoiceNo);
    if(dup){ 
      if(!confirm('⚠️ رقم الفاتورة "'+invoiceNo+'" مسجل مسبقاً عند المورد: '+dup.supplier+'\nهل تريد الإضافة على أي حال؟')) return; 
    }
  }
  DB.invoices.push({id:uid(),invoiceNo,supplier,desc,vehicleNo,vehicleDetails,projectId:projId,lineId,date,amount,tax,total});
  tempInvVehicles=[];
  // Add as transaction on project
  if(projId&&lineId){
    DB.transactions.push({id:uid(),projectId:projId,budgetLineId:lineId,vault:'cash',type:'out',amount,description:'فاتورة — '+supplier,date,payMethod:'cash'});
  }
  saveDB(); closeModal(); render();
  showToast('✅ تم حفظ الفاتورة','#10b981');
}

function removeContractPayment(i){

}

function saveContract(){
  const no=document.getElementById('nc-no')?.value?.trim()||'';
  const tenant=document.getElementById('nc-tenant')?.value?.trim()||'';
  const asset=document.getElementById('nc-asset')?.value?.trim()||'';
  const startDate=document.getElementById('nc-start')?.value||'';
  const endDate=document.getElementById('nc-end')?.value||'';
  const value=parseFloat(document.getElementById('nc-value')?.value)||0;
  const status=document.getElementById('nc-status')?.value||'active';
  const notes=document.getElementById('nc-notes')?.value?.trim()||'';
  const id=document.getElementById('nc-id')?.value||'';
  if(!tenant) return showToast('أدخل اسم المستأجر','#f43f5e');
  if(!DB.contracts) DB.contracts=[];
  if(!DB.purchaseRequests) DB.purchaseRequests=[];
  if(!DB.fixedExpenses) DB.fixedExpenses=[];
  if(!DB.tasks) DB.tasks=[];
  if(id){
    const idx=DB.contracts.findIndex(c=>c.id===id);
    if(idx>=0) DB.contracts[idx]={...DB.contracts[idx],contractNo:no,tenant,asset,startDate,endDate,value,status,notes,payments:[...tempContractPayments,...(DB.contracts[idx].payments||[]).filter(p=>p.status==='paid')]};
  } else {
    DB.contracts.push({id:uid(),contractNo:no,tenant,asset,startDate,endDate,value,status,notes,payments:[...tempContractPayments]});
  }
  tempContractPayments=[];
  saveDB(); closeModal(); render();
  showToast('✅ تم حفظ العقد','#10b981');
}


const PR_DEPTS=['العمليات','الحركة','الورشة','السكنات','الإدارة المالية','الشئون الإدارية','إدارة البلاغات','إدارة المشاريع'];
const PR_STATUS={pending:'معلق',approved:'موافق عليه',purchased:'تم الشراء',rejected:'مرفوض'};
const PR_STATUS_COLOR={pending:'#f59e0b',approved:'#6366f1',purchased:'#10b981',rejected:'#f43f5e'};



function tasksHTML(){
  const tasks=DB.tasks||[];
  const now=new Date();
  const pending=tasks.filter(t=>t.status!=='done');
  const done=tasks.filter(t=>t.status==='done');

  // Sort pending by due date
  pending.sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));

  let rows='';
  pending.forEach(t=>{
    const realIdx=tasks.indexOf(t);
    const emp=DB.employees.find(e=>e.id===t.assignedTo);
    const days=t.dueDate?Math.ceil((new Date(t.dueDate)-now)/86400000):null;
    let dueColor='var(--text3)', dueText=t.dueDate||'—';
    if(days!==null){
      if(days<0){ dueColor='#f43f5e'; dueText='متأخر '+Math.abs(days)+' يوم'; }
      else if(days===0){ dueColor='#f59e0b'; dueText='اليوم'; }
      else if(days<=3){ dueColor='#f59e0b'; dueText='بعد '+days+' يوم'; }
      else { dueText=t.dueDate; }
    }
    rows+='<tr>'+
      '<td style="font-weight:600;">'+t.title+'</td>'+
      '<td style="color:var(--text3);">'+(emp?emp.name:'—')+'</td>'+
      '<td style="color:'+dueColor+';font-weight:700;">'+dueText+'</td>'+
      '<td style="color:var(--text3);font-size:11px;">'+(t.notes||'—')+'</td>'+
      '<td><button onclick="completeTask('+realIdx+')" style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:6px;padding:4px 10px;color:#10b981;font-size:11px;cursor:pointer;">✓ تم</button></td>'+
      '<td><button onclick="deleteTask('+realIdx+')" style="background:none;border:none;cursor:pointer;color:#f43f5e;font-size:14px;">🗑</button></td>'+
    '</tr>';
  });

  let doneRows='';
  done.slice(0,10).forEach(t=>{
    const realIdx=tasks.indexOf(t);
    const emp=DB.employees.find(e=>e.id===t.assignedTo);
    doneRows+='<tr style="opacity:0.6;">'+
      '<td style="font-weight:600;text-decoration:line-through;">'+t.title+'</td>'+
      '<td style="color:var(--text3);">'+(emp?emp.name:'—')+'</td>'+
      '<td style="color:var(--text3);">'+(t.completedDate||'—')+'</td>'+
      '<td><button onclick="deleteTask('+realIdx+')" style="background:none;border:none;cursor:pointer;color:#f43f5e;font-size:14px;">🗑</button></td>'+
    '</tr>';
  });

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div style="font-weight:800;font-size:16px;">✅ المهام والتذكيرات</div>
    <button onclick="openModal('addTask')" class="btn btn-gold btn-pill btn-sm">+ مهمة جديدة</button>
  </div>

  <div class="glass" style="overflow:hidden;margin-bottom:16px;">
    ${pending.length===0?'<div style="padding:30px;text-align:center;color:var(--text4);">لا توجد مهام معلقة 🎉</div>':`
    <table class="tbl">
      <thead><tr><th>المهمة</th><th>الموظف</th><th>الموعد</th><th>ملاحظات</th><th></th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`}
  </div>

  ${done.length>0?`
  <div style="font-size:13px;font-weight:700;color:var(--text3);margin-bottom:10px;">✓ مهام منجزة</div>
  <div class="glass" style="overflow:hidden;">
    <table class="tbl">
      <thead><tr><th>المهمة</th><th>الموظف</th><th>تاريخ الإنجاز</th><th></th></tr></thead>
      <tbody>${doneRows}</tbody>
    </table>
  </div>`:''}`;
}

function completeTask(idx){
  const t=DB.tasks[idx]; if(!t) return;
  t.status='done';
  t.completedDate=today();
  saveDB(); render();
  showToast('✅ تم إنجاز المهمة','#10b981');
}

function deleteTask(idx){
  if(!confirm('حذف المهمة؟')) return;
  DB.tasks.splice(idx,1);
  saveDB(); render();
  showToast('تم الحذف','#f43f5e');
}

function saveTask(){
  const title=document.getElementById('tk-title')?.value?.trim()||'';
  const assignedTo=document.getElementById('tk-emp')?.value||'';
  const dueDate=document.getElementById('tk-date')?.value||'';

  showToast('✅ تم إضافة المهمة','#10b981');
}

function renderPurchaseReqTable(){
  const deptF=document.getElementById('pr-filter-dept')?.value||'';
  const statusF=document.getElementById('pr-filter-status')?.value||'';
  const monthF=document.getElementById('pr-filter-month')?.value||'';
  let reqs=DB.purchaseRequests||[];
  if(deptF) reqs=reqs.filter(r=>r.dept===deptF);
  if(statusF) reqs=reqs.filter(r=>r.status===statusF);
  if(monthF) reqs=reqs.filter(r=>(r.date||'').substring(5,7)===monthF);

  const tbody=document.getElementById('pr-tbody');
  if(!tbody) return;
  if(!reqs.length){
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text4);">لا توجد نتائج</td></tr>';
    return;
  }
  tbody.innerHTML=reqs.map(r=>{
    const realIdx=(DB.purchaseRequests||[]).indexOf(r);
    const col=PR_STATUS_COLOR[r.status]||'#999';
    const statusSelect='<select onchange="updatePurchaseReqStatus('+realIdx+',this.value)" style="background:'+col+'18;color:'+col+';border:1px solid '+col+'44;border-radius:50px;padding:3px 8px;font-size:11px;font-weight:700;">'+
      Object.keys(PR_STATUS).map(k=>'<option value="'+k+'" '+(r.status===k?'selected':'')+'>'+PR_STATUS[k]+'</option>').join('')+
      '</select>';

      '<td style="color:var(--text3);">'+(r.date||'—')+'</td>'+

function exportPurchaseReqExcel(){
  const deptF=document.getElementById('pr-filter-dept')?.value||'';
  const statusF=document.getElementById('pr-filter-status')?.value||'';
  const monthF=document.getElementById('pr-filter-month')?.value||'';
  let reqs=DB.purchaseRequests||[];
  if(deptF) reqs=reqs.filter(r=>r.dept===deptF);
  if(statusF) reqs=reqs.filter(r=>r.status===statusF);
  if(monthF) reqs=reqs.filter(r=>(r.date||'').substring(5,7)===monthF);
  if(!reqs.length) return showToast('لا توجد طلبات','#f43f5e');
  const rows=[['القسم','اسم المنتج / الطلب','الكمية','التاريخ','الحالة','ملاحظات']];
  reqs.forEach(r=>{
    rows.push([r.dept,r.itemName,r.quantity,r.date||'',PR_STATUS[r.status]||r.status,r.notes||'']);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='طلبات_الشراء_'+today()+'.csv';
  a.click();
  showToast('✅ تم تصدير Excel','#10b981');
}

      if(p.status==='paid') return;
      const days=Math.ceil((new Date(p.dueDate)-now)/86400000);
      if(days>30||days<-7) return;
      const col=days<0?'#f43f5e':days<=7?'#f43f5e':'#f59e0b';
      const dayTxt=days<0?'متأخر '+Math.abs(days)+' يوم':days===0?'اليوم':'بعد '+days+' يوم';
      alertHtml+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(245,158,11,0.15);">'+

  if(text) invs=invs.filter(i=>(i.supplier||'').toLowerCase().includes(text)||(i.desc||'').toLowerCase().includes(text)||(i.invoiceNo||'').toLowerCase().includes(text));

function exportInvoicesExcel(){
  const invs=DB.invoices||[];
  if(!invs.length) return showToast('لا توجد فواتير','#f43f5e');
  const rows=[['رقم الفاتورة','المورد','وصف الخدمة','رقم السيارة','المشروع','البند','التاريخ','القيمة','الضريبة','الإجمالي']];
  invs.forEach(inv=>{
    const proj=DB.projects.find(p=>p.id===inv.projectId)||{name:'—'};
    const line=DB.lines.find(l=>l.id===inv.lineId)||{category:'—'};
    rows.push([
      inv.invoiceNo||'',
      inv.supplier||'',
      inv.desc||'',
      inv.vehicleNo||'',
      proj.name,
      line.category,
      inv.date||'',
      inv.amount||0,
      inv.tax||0,
      inv.total||0
    ]);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='فواتير_'+today()+'.csv';
  a.click();
  showToast('✅ تم تصدير Excel','#10b981');
}

function handleInvoiceImport(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.split('\n').slice(1);
    let count=0;
    lines.forEach(line=>{
      const cols=line.split(',');
      if(cols.length<6) return;
      const amount=parseFloat(cols[5])||0;
      const tax=parseFloat(cols[6])||Math.round(amount*0.15*100)/100;
      const total=parseFloat(cols[7])||amount+tax;
      const projName=(cols[2]||'').trim();
      const lineName=(cols[3]||'').trim();
      const proj=DB.projects.find(p=>p.name===projName)||DB.projects[0]||{id:''};
      const line2=DB.lines.find(l=>l.category===lineName&&l.projectId===proj.id)||DB.lines.find(l=>l.projectId===proj.id)||{id:''};
      if(!amount) return;
      DB.invoices.push({
        id:uid(),
        invoiceNo:(cols[0]||'').trim(),
        supplier:(cols[1]||'').trim(),
        projectId:proj.id,
        lineId:line2.id,
        date:(cols[4]||today()).trim(),
        amount,tax,total
      });
      // Add as transaction
      if(proj.id&&line2.id){
        DB.transactions.push({id:uid(),projectId:proj.id,budgetLineId:line2.id,vault:'cash',type:'out',amount,description:'فاتورة — '+(cols[1]||'').trim(),date:(cols[4]||today()).trim(),payMethod:'cash'});
      }
      count++;
    });
    saveDB(); render();
    showToast('✅ تم استيراد '+count+' فاتورة','#10b981');
  };
  reader.readAsText(file,'UTF-8');
}

function printEmployeeStatement(empId){
  const e=DB.employees.find(x=>x.id===empId); if(!e) return;
  const custs=(DB.custodies||[]).filter(c=>c.employeeId===empId);
  if(!custs.length){ showToast('لا توجد عهد لهذا الموظف','#f43f5e'); return; }

  const totalAmount=custs.reduce((s,c)=>s+(c.amount||0),0);
  const totalSettled=custs.reduce((s,c)=>{
    const invTotal=(c.invoices||[]).reduce((a,i)=>a+(i.amount||0),0);
    return s+invTotal+(c.returned||0);
  },0);
  // الفرق الحقيقي = العهدة - المسوى (موجب = متبقي عليك، سالب = زيادة صرفتها)
  const balanceDiff=totalAmount-totalSettled;

  const companyName=DB.companyName||COMPANY;
  const logo=DB.logo?`<img src="${DB.logo}" style="width:55px;height:55px;object-fit:contain;border-radius:8px;">`:'<div style="width:55px;height:55px;background:#f5f0e8;border:2px solid #b8892a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;">🏢</div>';

  const rows=custs.map((c,idx)=>{
    const proj=DB.projects.find(p=>p.id===c.projectId)||{name:'—'};
    const line=DB.lines.find(l=>l.id===c.budgetLineId)||{category:'—'};
    const invTotal=(c.invoices||[]).reduce((a,i)=>a+(i.amount||0),0);
    const diff=c.amount-invTotal-(c.returned||0);
    const statusText=Math.abs(diff)<0.5?'✓ مسوى':diff>0?'متبقي عليك':'🔵 زيادة';
    const statusColor=Math.abs(diff)<0.5?'#10b981':diff>0?'#f43f5e':'#6366f1';
    const diffDisplay=Math.abs(diff)<0.5?'—':fmt(Math.abs(diff))+' '+SAR;
    return `<tr>
      <td style="text-align:center;">${idx+1}</td>
      <td>${proj.name}</td>
      <td>${line.category}</td>
      <td style="text-align:center;">${c.issuedAt||'—'}</td>
      <td style="text-align:center;font-weight:700;">${fmt(c.amount)} ${SAR}</td>
      <td style="text-align:center;color:#10b981;">${fmt(invTotal+(c.returned||0))} ${SAR}</td>
      <td style="text-align:center;font-weight:700;color:${statusColor};">${diffDisplay}</td>
      <td style="text-align:center;"><span style="background:${statusColor}18;color:${statusColor};border-radius:50px;padding:2px 8px;font-size:10px;">${statusText}</span></td>
    </tr>`;
  }).join('');

  const html=`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;padding:16mm 18mm;}
    .header{border:2px solid #1a5276;border-radius:10px;padding:14px 18px;margin-bottom:16px;}
    .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #ddd;}
    .logo-area{display:flex;align-items:center;gap:12px;}
    .company-name{font-size:17px;font-weight:900;color:#1a5276;}
    .report-title h2{font-size:18px;font-weight:900;color:#b8892a;}
    .report-title p{font-size:11px;color:#666;margin-top:3px;}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .info-item{background:#f8f9fa;border-radius:8px;padding:8px 12px;}
    .info-label{font-size:9px;color:#888;margin-bottom:3px;}
    .info-value{font-size:13px;font-weight:800;color:#1a5276;}
    table{width:100%;border-collapse:collapse;font-size:10.5px;margin-bottom:16px;}
    thead tr{background:#1a5276;color:white;}
    thead th{padding:7px 5px;text-align:right;font-weight:700;}
    tbody tr:nth-child(even){background:#f8f9fa;}
    tbody td{padding:6px 5px;border-bottom:1px solid #e8e8e8;}
    .summary-box{border:2px solid #1a5276;border-radius:10px;padding:12px 18px;width:320px;margin-bottom:30px;}
    .summary-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #eee;}
    .summary-row:last-child{border-bottom:none;border-top:2px solid #1a5276;margin-top:4px;padding-top:8px;font-weight:900;font-size:14px;}
    .signatures{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:40px;}
    .sig-box{text-align:center;}
    .sig-space{height:55px;}
    .sig-line{border-top:1.5px solid #333;padding-top:6px;}

  <div class="header">
    <div class="header-top">
      <div class="logo-area">${logo}<div><div class="company-name">${companyName}</div></div></div>
      <div class="report-title"><h2>كشف حساب موظف</h2><p>تاريخ الطباعة: ${today()}</p></div>
    </div>
    <div class="info-grid">

      <div class="info-item"><div class="info-label">المسمى الوظيفي</div><div class="info-value">${e.role||'—'}</div></div>
    </div>
  </div>
  <table>
    <thead><tr><th>#</th><th>المشروع</th><th>البند</th><th>تاريخ الصرف</th><th>المبلغ</th><th>المسوى</th><th>الفرق</th><th>الحالة</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="summary-box">
    <div class="summary-row"><span>إجمالي العهد المصروفة:</span><span style="color:#1a5276;">${fmt(totalAmount)} ${SAR}</span></div>
    <div class="summary-row"><span>إجمالي الفواتير المسواة:</span><span style="color:#10b981;">${fmt(totalSettled)} ${SAR}</span></div>
    <div class="summary-row"><span>${Math.abs(balanceDiff)<0.5?'✅ الحساب مطابق':balanceDiff>0?'🔴 متبقي عليك:':'🔵 زيادة صرفتها:'}</span><span style="color:${Math.abs(balanceDiff)<0.5?'#10b981':balanceDiff>0?'#f43f5e':'#6366f1'};">${Math.abs(balanceDiff)<0.5?'صفر':fmt(Math.abs(balanceDiff))+' '+SAR}</span></div>
  </div>
  <div class="signatures">
    <div class="sig-box"><div class="sig-space"></div><div class="sig-line"><div class="sig-title">الموظف</div></div></div>

  </div>
  <script>window.onload=()=>window.print();<\/script>

  const win=window.open('','_blank');
  win.document.write(html);
  win.document.close();
}

function openModal(type,data){
  tempInvoices=[];
  tempInvVehicles=[];
  tempContractPayments=[];
  if(type==='settle'){
    const c=DB.custodies.find(x=>x.id===data);
    if(c) tempInvoices=[...(c.invoices||[])];
  }
  const overlay=document.createElement('div');
  overlay.className='overlay'; overlay.id='modal-overlay';
  overlay.onclick=e=>{ if(e.target===overlay) closeModal(); };
  try{
    const html=getModalHTML(type,data);
    overlay.innerHTML=`<div class="sheet">${html}</div>`;
  }catch(err){
    console.error('Modal error:',err);
    overlay.innerHTML=`<div class="sheet" style="padding:20px;"><div style="color:#f43f5e;font-weight:700;">خطأ: ${err.message}</div><button onclick="closeModal()" class="btn btn-ghost btn-full" style="margin-top:16px;">إغلاق</button></div>`;
  }
  document.body.appendChild(overlay);
  if(type==='settle') setTimeout(()=>{refreshInvList();updateSettleDiff();},100);
}
function closeModal(){ const el=document.getElementById('modal-overlay'); if(el) el.remove(); }

/* ═══════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════ */
function setSeg(field,val,btn){
  btn.parentElement.querySelectorAll('.seg-btn').forEach(b=>{b.style.background='';b.style.color='';});
  const cols={out:'rgba(244,63,94,0.15)',in:'rgba(16,185,129,0.15)',cash:'rgba(16,185,129,0.15)',card:'rgba(56,189,248,0.15)'};
  const tc={out:'#f43f5e',in:'#10b981',cash:'#10b981',card:'#38bdf8'};
  btn.style.background=cols[val]||'rgba(212,168,67,0.15)';
  btn.style.color=tc[val]||'var(--gold2)';
  const el=document.getElementById(field); if(el) el.value=val;
}
function updateLineOpts(sid,pid){
  const el=document.getElementById(sid);
  if(el) el.innerHTML=DB.lines.filter(l=>l.projectId===pid).map(l=>`<option value="${l.id}">${l.category}</option>`).join('');
}
function addInvoice(){
  const descEl=document.getElementById('new-inv-desc');
  const amtEl=document.getElementById('new-inv-amt');
  const urlEl=document.getElementById('new-inv-url');
  if(!descEl||!amtEl) return;
  const desc=descEl.value||'';
  const amt=parseFloat(amtEl.value)||0;
  const url=urlEl?urlEl.value||'':'';
  if(!amt||amt<=0){ showToast('أدخل المبلغ','#f43f5e'); return; }
  tempInvoices.push({desc,amount:amt,url});
  descEl.value='';
  amtEl.value='';
  if(urlEl) urlEl.value='';
  refreshInvList();
  updateSettleDiff();
}
function removeInvoice(i){ tempInvoices.splice(i,1); refreshInvList(); updateSettleDiff(); }
function refreshInvList(){
  const el=document.getElementById('inv-list'); if(!el) return;
  if(tempInvoices.length===0){
    el.innerHTML='<div style="padding:10px;text-align:center;color:var(--text4);font-size:12px;">لا توجد فواتير بعد</div>';
    return;
  }
  el.innerHTML=tempInvoices.map((inv,i)=>
    '<div style="padding:8px 0;border-bottom:1px solid var(--border);">'+
    '<div style="display:flex;align-items:center;gap:8px;">'+
    '<span style="flex:1;font-size:12px;color:var(--text);">'+(inv.desc||'فاتورة')+'</span>'+
    '<span style="font-size:12px;font-weight:700;color:#6366f1;">'+fmt(inv.amount)+' '+SAR+'</span>'+
    '<button onclick="removeInvoice('+i+')" style="background:none;border:none;cursor:pointer;color:#f43f5e;font-size:16px;">✕</button>'+
    '</div>'+
    (inv.url?'<a href="'+inv.url+'" target="_blank" style="font-size:10px;color:#38bdf8;">🔗 عرض الفاتورة</a>':'')+
    '</div>'
  ).join('');
}
function updateSettleDiff(){
  const cid=document.getElementById('settle-cust-id')?.value;
  const c=DB.custodies.find(x=>x.id===cid); if(!c) return;
  const invTotal=tempInvoices.reduce((s,i)=>s+i.amount,0);
  const returned=+document.getElementById('settle-returned')?.value||0;
  const diff=c.amount-invTotal-returned;
  const el=document.getElementById('settle-diff'); if(!el) return;
  if(Math.abs(diff)<0.5){el.style.background='rgba(16,185,129,0.08)';el.style.borderColor='rgba(16,185,129,0.2)';el.innerHTML='<span style="color:#34d399;font-weight:800;">✅ مسوى بالكامل</span>';}
  else if(diff>0){el.style.background='rgba(244,63,94,0.08)';el.style.borderColor='rgba(244,63,94,0.2)';el.innerHTML=`<span style="color:#f87171;font-weight:800;">🔴 ذمة الموظف: ${fmt(diff)} ${SAR}</span>`;}
  else{el.style.background='rgba(56,189,248,0.08)';el.style.borderColor='rgba(56,189,248,0.2)';el.innerHTML=`<span style="color:#38bdf8;font-weight:800;">🔵 مستحق للموظف: ${fmt(Math.abs(diff))} ${SAR}</span>`;}
}
function selectColor(c,btn){
  document.querySelectorAll('[data-color]').forEach(b=>b.style.outline='none');
  btn.style.outline=`3px solid ${c}`;btn.style.outlineOffset='3px';

function initSigCanvas(canvasId, placeholderId, color){
  const canvas=document.getElementById(canvasId); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const ph=document.getElementById(placeholderId);
  let drawing=false;
  ctx.strokeStyle=color||'#f0c866'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width, sy=canvas.height/r.height;
    if(e.touches) return {x:(e.touches[0].clientX-r.left)*sx, y:(e.touches[0].clientY-r.top)*sy};
    return {x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy};
  }
  function start(e){ e.preventDefault(); drawing=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); if(ph) ph.style.display='none'; }
  function move(e){ e.preventDefault(); if(!drawing) return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
}

  const canvas=document.getElementById('sig-canvas');

  if(ph) ph.style.display='flex';
}

function saveSettle(){
  const custId=document.getElementById('settle-cust-id')?.value;
  const returned=+document.getElementById('settle-returned')?.value||0;
  const c=DB.custodies.find(x=>x.id===custId);
  if(!c) return showToast('خطأ: العهدة مش موجودة','#f43f5e');

  const invTotal=tempInvoices.reduce((s,i)=>s+i.amount,0);
  const diff=c.amount-invTotal-returned;
  const status=Math.abs(diff)<0.5?'settled':invTotal+returned>0?'partial':'open';

  // Update custody - settle employee account only
  DB.custodies=DB.custodies.map(x=>{
    if(x.id!==custId) return x;
    return {...x,invoices:tempInvoices,returned,status};
  });

  // Only add returned cash as income transaction
  if(returned>0){
    DB.transactions.push({
      id:uid(),
      projectId:c.projectId,
      budgetLineId:c.budgetLineId,
      vault:c.vault||'cash',
      type:'in',
      amount:returned,
      description:'استرداد عهدة — '+empById(c.employeeId).name,
      date:today(),
      payMethod:'cash'
    });
  }

  tempInvoices=[];
  saveDB(); closeModal();
  showToast('✅ تم تسوية حساب الموظف','#10b981');
  render();
}

function importAssetsExcel(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'binary'});
      // Read "الأصول" sheet
      const sheetName = wb.SheetNames.find(n=>n==='الأصول')||wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws);

      if(rows.length===0) return showToast('الملف فاضي أو التنسيق غلط','#f43f5e');

      let added=0, skipped=0;
      if(!DB.assets) DB.assets=[];

      rows.forEach(row=>{
        const name = row['اسم الأصل']?.toString()?.trim();
        if(!name){ skipped++; return; }

        // Match project by name
        const projName = row['اسم المشروع']?.toString()?.trim()||'';
        const proj = DB.projects.find(p=>p.name.includes(projName)||projName.includes(p.name));

        // Validate condition
        const cond = row['الحالة']?.toString()?.trim();
        const validCond = ASSET_CONDITIONS.includes(cond)?cond:'شغال';

        // Validate type
        const typeVal = row['نوع الأصل (vehicle/equipment/office/furniture/other)']?.toString()?.trim();
        const validType = ASSET_TYPES.find(t=>t.k===typeVal)?typeVal:'other';

        DB.assets.push({
          id: uid(),
          name,
          type: validType,
          serialNo: row['الرقم التسلسلي / رقم اللوحة']?.toString()?.trim()||'',
          projectId: proj?.id||DB.projects[0]?.id||'',
          value: +row['القيمة (ر.س)']||0,
          purchaseDate: row['تاريخ الشراء (YYYY-MM-DD)']?.toString()?.trim()||'',
          condition: validCond,
          notes: row['ملاحظات']?.toString()?.trim()||'',
        });
        added++;
      });

      saveDB();
      currentTab='assets';
      render();
      showToast(`تم استيراد ${added} أصل${skipped>0?' ('+skipped+' تم تجاهله)':''} ✓`,'#10b981');
    }catch(err){
      showToast('خطأ في قراءة الملف — تأكد من التنسيق','#f43f5e');
    }
  };
  reader.readAsBinaryString(file);
  event.target.value=''; // Reset input
}

let tempStmtItems=[];

function addStmtItem(){
  const desc=document.getElementById('st-item-desc')?.value?.trim();
  const amt=+document.getElementById('st-item-amt')?.value||0;
  const inv=document.getElementById('st-item-inv')?.value||'';
  const date=document.getElementById('st-item-date')?.value||today();
  if(!desc||!amt) return showToast('أدخل الوصف والمبلغ','#f43f5e');
  tempStmtItems.push({desc,amount:amt,invNo:inv,date});
  document.getElementById('st-item-desc').value='';
  document.getElementById('st-item-amt').value='';
  document.getElementById('st-item-inv').value='';
  refreshStmtItems();
  updateStmtTotal();
  document.getElementById('st-item-desc')?.focus();
}

function removeStmtItem(i){
  tempStmtItems.splice(i,1);
  refreshStmtItems();
  updateStmtTotal();
}

function refreshStmtItems(){
  const el=document.getElementById('st-items-list'); if(!el) return;
  if(tempStmtItems.length===0){ el.innerHTML=''; return; }
  el.innerHTML=`<div style="background:rgba(255,255,255,0.03);border-radius:10px;overflow:hidden;margin-bottom:2px;">

function updateStmtTotal(){
  const total=tempStmtItems.reduce((s,i)=>s+i.amount,0);
  const el=document.getElementById('st-total');
  if(el) el.textContent=`${fmt(total)} ${SAR}`;
}

function clearStmtSig(){
  const c=document.getElementById('st-sig-canvas'); if(!c) return;
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  const ph=document.getElementById('st-sig-ph'); if(ph) ph.style.display='flex';
}

function saveStatement(){
  if(tempStmtItems.length===0) return showToast('أضف بند واحد على الأقل','#f43f5e');
  const canvas=document.getElementById('st-sig-canvas');
  const sig=canvas?canvas.toDataURL():'';
  if(!DB.statements) DB.statements=[];
  const stmt={
    id:uid(),
    employeeId:document.getElementById('st-emp')?.value||'',
    projectId:document.getElementById('st-proj')?.value||'',
    custodyId:document.getElementById('st-cust')?.value||'',
    fileNum:document.getElementById('st-filenum')?.value||'',
    date:document.getElementById('st-date')?.value||today(),
    items:[...tempStmtItems],
    returnedCash:+document.getElementById('st-returned')?.value||0,
    signature:sig,
    status:'open',
  };
  DB.statements.push(stmt);
  // Auto-settle custody if linked
  if(stmt.custodyId){
    const total=stmt.items.reduce((s,i)=>s+i.amount,0);
    DB.custodies=DB.custodies.map(c=>{
      if(c.id!==stmt.custodyId) return c;
      const diff=c.amount-total-stmt.returnedCash;
      return {...c,invoices:stmt.items.map(i=>({desc:i.desc,amount:i.amount})),returned:stmt.returnedCash,status:Math.abs(diff)<0.5?'settled':'partial'};
    });
  }
  tempStmtItems=[];
  saveDB(); closeModal();
  showToast('تم حفظ الكشف ✓','#10b981');
  currentTab='statements'; render();
}

function settleFromStatement(stmtId){
  const s=DB.statements.find(x=>x.id===stmtId); if(!s||!s.custodyId) return;
  const total=s.items.reduce((a,i)=>a+i.amount,0);
  DB.custodies=DB.custodies.map(c=>{
    if(c.id!==s.custodyId) return c;
    const diff=c.amount-total-s.returnedCash;
    return {...c,invoices:s.items.map(i=>({desc:i.desc,amount:i.amount})),returned:s.returnedCash,status:Math.abs(diff)<0.5?'settled':'partial'};
  });
  saveDB(); showToast('تم تسوية العهدة ✓','#10b981'); render();
}

function saveItem(){
  const name=document.getElementById('wi-name')?.value?.trim();
  if(!name) return showToast('أدخل اسم المادة','#f43f5e');
  if(!DB.items) DB.items=[];
  DB.items.push({
    id:uid(),
    name,
    unit:document.getElementById('wi-unit').value,
    minQty:+document.getElementById('wi-min')?.value||0,
    unitPrice:+document.getElementById('wi-price')?.value||0,
  });
  saveDB(); closeModal(); showToast(`تم إضافة "${name}" ✓`,'#10b981'); render();
}

function saveStockIn(){
  const itemId=document.getElementById('si-item')?.value;
  const qty=+document.getElementById('si-qty')?.value||0;
  if(!itemId||qty<=0) return showToast('أدخل المادة والكمية','#f43f5e');
  if(!DB.stockMovements) DB.stockMovements=[];
  const price=+document.getElementById('si-price')?.value||0;
  // Update item unit price if provided
  if(price>0){ const it=DB.items.find(x=>x.id===itemId); if(it) it.unitPrice=price; }
  DB.stockMovements.push({
    id:uid(), itemId, type:'in', qty,
    ref:document.getElementById('si-ref')?.value||'',
    note:document.getElementById('si-note')?.value||'',
    date:document.getElementById('si-date')?.value||today(),
  });
  saveDB(); closeModal();
  const it=DB.items.find(x=>x.id===itemId);
  showToast(`تم تسجيل وارد: ${fmt(qty)} ${it?.unit||''} ✓`,'#10b981'); render();
}

function saveStockOut(){
  const itemId=document.getElementById('so-item')?.value;
  const qty=+document.getElementById('so-qty')?.value||0;
  if(!itemId||qty<=0) return showToast('أدخل المادة والكمية','#f43f5e');
  // Check balance
  const stock=(DB.stockMovements||[]).filter(m=>m.itemId===itemId).reduce((s,m)=>s+(m.type==='in'?m.qty:-m.qty),0);
  if(qty>stock) return showToast(`الكمية تتجاوز الرصيد (${fmt(stock)})','#f43f5e`);
  if(!DB.stockMovements) DB.stockMovements=[];
  DB.stockMovements.push({
    id:uid(), itemId, type:'out', qty,
    projectId:document.getElementById('so-proj')?.value||'',
    note:document.getElementById('so-note')?.value||'',
    date:document.getElementById('so-date')?.value||today(),
  });
  saveDB(); closeModal();
  const it=DB.items.find(x=>x.id===itemId);
  showToast(`تم صرف: ${fmt(qty)} ${it?.unit||''} ✓`,'#f59e0b'); render();
}

  const el=document.getElementById('stock-balance-warn'); if(!el) return;
  const stock=(DB.stockMovements||[]).filter(m=>m.itemId===itemId).reduce((s,m)=>s+(m.type==='in'?m.qty:-m.qty),0);
  const qty=+document.getElementById('so-qty')?.value||0;
  const it=DB.items.find(x=>x.id===itemId)||{unit:''};
  const after=stock-qty;
  el.innerHTML=`<div style="background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 12px;font-size:12px;display:flex;justify-content:space-between;">

function checkMonthlyBudgetAlerts(){
  const now=new Date();
  const ls=lineSpentAll();
  const alerts=[];
  (DB.monthlyBudgets||[]).filter(b=>b.month===now.getMonth()+1&&b.year===now.getFullYear()).forEach(b=>{
    const spent=ls[b.lineId]||0;
    const line=DB.lines.find(l=>l.id===b.lineId);
    if(!line) return;
    const proj=DB.projects.find(p=>p.id===line.projectId);
    if(spent>b.amount){
      alerts.push({type:'danger',msg:'تجاوز ميزانية الشهر: '+line.category+' — '+(proj?.name||'')});
    } else if(spent>b.amount*0.8){
      alerts.push({type:'warn',msg:'اقتراب من ميزانية الشهر: '+line.category+' — '+(proj?.name||'')});
    }
  });
  return alerts;
}

function handleEmployeeImport(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.split('\n').slice(1);
    let count=0;
    lines.forEach(line=>{
      if(!line.trim()) return;
      const cols=line.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
      const name=cols[0]||'';
      if(!name) return;
      const role=cols[1]||'';
      const projName=cols[2]||'';
      const fileNum=cols[3]||'';
      const nationalId=cols[4]||'';
      const salary=parseFloat(cols[5])||0;
      const proj=DB.projects.find(p=>p.name===projName);
      DB.employees.push({id:uid(),name,role,projectId:proj?proj.id:'',fileNum,nationalId,salary});
      count++;
    });
    saveDB(); render();
    showToast('✅ تم استيراد '+count+' موظف','#10b981');
  };
  reader.readAsText(file,'UTF-8');
}

function exportExcel(){

  DB.projects.forEach(p=>{
    const rows=projLines(p.id).map(l=>({'البند':l.category,'المعتمد':l.approvedAmount,'المصروف':ls[l.id]||0,'المتبقي':l.approvedAmount-(ls[l.id]||0),'نسبة%':pct(ls[l.id]||0,l.approvedAmount)}));
    if(rows.length) XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),p.name.slice(0,28));
  });

  if(DB.claims.length) XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.claims.map(c=>({'التاريخ':c.date,'المشروع':projById(c.projectId).name,'البند':lineById(c.budgetLineId).category,'المورد':c.supplier,'الفاتورة':c.invoiceNo||'','المبلغ':c.amount,'الحالة':c.status==='paid'?'مدفوع':'معلق'}))),'مطالبات الموردين');
  if(DB.vehicles&&DB.vehicles.length){
    const vr=(DB.vehicles||[]).map(v=>{
      const exps=(DB.vehicleExpenses||[]).filter(e=>e.vehicleId===v.id);
      return({'السيارة':v.name,'رقم اللوحة':v.plateNo,'النوع':v.type,'المشروع':projById(v.projectId).name,'الحالة':v.status,'إجمالي المحروقات':exps.filter(e=>e.type==='fuel').reduce((s,e)=>s+e.amount,0),'إجمالي الصيانة':exps.filter(e=>e.type==='maintenance').reduce((s,e)=>s+e.amount,0)});
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(vr),'السيارات والمعدات');
    if(DB.vehicleExpenses&&DB.vehicleExpenses.length){
      const ver=(DB.vehicleExpenses||[]).map(e=>{
        const v=(DB.vehicles||[]).find(x=>x.id===e.vehicleId)||{name:'—',plateNo:''};
        return({'التاريخ':e.date,'السيارة':v.name,'اللوحة':v.plateNo,'النوع':e.type==='fuel'?'محروقات':'صيانة','المبلغ':e.amount,'اللترات':e.liters||0,'المشروع':projById(e.projectId).name,'ملاحظة':e.note||''});
      });
      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ver),'مصروفات السيارات');
    }
  }
  if(DB.extracts&&DB.extracts.length){
    const er=(DB.extracts||[]).map(e=>({'المشروع':projById(e.projectId).name,'رقم المستخلص':e.number,'الشهر':MONTHS_AR[(e.month||1)-1],'السنة':e.year,'المبلغ':e.amount,'تاريخ الاعتماد':e.approvalDate||'','تاريخ الصرف':e.payDate||'','الحالة':e.status==='paid'?'مدفوع':'معلق','ملاحظات':e.notes||''}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(er),'المستخلصات');
  }
  if(DB.assets&&DB.assets.length){
    const ar=(DB.assets||[]).map(a=>{const t=ASSET_TYPES.find(x=>x.k===a.type)||{lb:'أخرى'};return({'اسم الأصل':a.name,'النوع':t.lb,'الرقم التسلسلي':a.serialNo||'','المشروع':projById(a.projectId).name,'القيمة':a.value||0,'تاريخ الشراء':a.purchaseDate||'','الحالة':a.condition,'ملاحظات':a.notes||''});});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ar),'الأصول الثابتة');
  }
  if(DB.items&&DB.items.length){
    const sr=(DB.items||[]).map(it=>{const st=(DB.stockMovements||[]).filter(m=>m.itemId===it.id).reduce((s,m)=>s+(m.type==='in'?m.qty:-m.qty),0);return({'اسم المادة':it.name,'الوحدة':it.unit,'الرصيد':st,'الحد الأدنى':it.minQty||0,'سعر الوحدة':it.unitPrice||0,'القيمة':st*(it.unitPrice||0)});});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(sr),'المخزن');
    if(DB.stockMovements&&DB.stockMovements.length){
      const mr=DB.stockMovements.map(m=>{const it=(DB.items||[]).find(x=>x.id===m.itemId)||{name:'—',unit:''};return({'التاريخ':m.date,'المادة':it.name,'النوع':m.type==='in'?'وارد':'صرف','الكمية':m.qty,'الوحدة':it.unit,'المشروع':m.projectId?projById(m.projectId).name:'—','ملاحظة':m.note||''});});

    }
  }
  XLSX.writeFile(wb,`المجال_العربي_${today()}.xlsx`);
  showToast('تم تصدير Excel ✓','#10b981');
}

function showToast(msg,col='#10b981'){
  const old=document.getElementById('toast-el');if(old)old.remove();
  const el=document.createElement('div');el.id='toast-el';el.className='toast';
  el.style.cssText=`background:${col}22;border:1px solid ${col}55;color:${col};box-shadow:0 8px 30px ${col}33;`;
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}
